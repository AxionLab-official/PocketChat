<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💬 PocketChat — IA Local no Navegador</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;600&family=Geist:wght@300;400;500;600&display=swap" />
  <style>
    :root {
      --bg:         #f5f4f0; --surface:    #ffffff; --surface2:   #efefeb;
      --border:     #ddddd8; --border2:    #c8c8c2;
      --accent:     #2563eb; --accent-dim: #dbeafe;
      --user-bg:    #2563eb; --user-text:  #ffffff;
      --bot-bg:     #ffffff; --bot-text:   #1a1a1a;
      --text:       #1a1a1a; --muted:      #888884;
      --think-bg:   #fafaf7; --think-bd:   #e0e0d8; --think-text: #666660;
      --radius:     16px;
      --shadow:     0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.05);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Geist', sans-serif; overflow: hidden; -webkit-font-smoothing: antialiased; }

    #app { display: flex; flex-direction: column; height: 100dvh; max-width: 740px; margin: 0 auto; background: var(--surface); box-shadow: 0 0 0 1px var(--border), var(--shadow); }

    /* ── Header ── */
    header { flex-shrink: 0; padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: var(--surface); }
    .avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; color: #fff; }
    .header-text { flex: 1; min-width: 0; }
    .header-title { font-size: 1rem; font-weight: 600; letter-spacing: -.01em; }
    .header-sub { font-size: .68rem; color: var(--muted); margin-top: 1px; font-family: 'Geist Mono', monospace; }
    .header-actions { display: flex; align-items: center; gap: 8px; }
    #clear-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      font-size: .68rem; font-family: 'Geist Mono', monospace;
      padding: 4px 9px; border-radius: 6px; cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    #clear-btn:hover { border-color: #dc2626; color: #dc2626; }
    .status-pill {
      display: flex; align-items: center; gap: 5px; font-size: .68rem; color: var(--muted);
      background: var(--surface2); border: 1px solid var(--border);
      padding: 4px 10px; border-radius: 20px; flex-shrink: 0; transition: all .3s;
    }
    .status-pill.ready  { color: #16a34a; background: #f0fdf4; border-color: #bbf7d0; }
    .status-pill.loading{ color: #d97706; background: #fffbeb; border-color: #fde68a; }
    .status-pill.typing { color: var(--accent); background: var(--accent-dim); border-color: #bfdbfe; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .status-pill.loading .status-dot, .status-pill.typing .status-dot { animation: blink .7s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

    /* ── Messages ── */
    #messages { flex: 1; overflow-y: auto; padding: 20px 18px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    .msg { display: flex; gap: 10px; align-items: flex-start; animation: slide-up .2s cubic-bezier(.25,.46,.45,.94) both; }
    @keyframes slide-up { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .msg.user { flex-direction: row-reverse; }

    .msg-icon { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; margin-top: 2px; }
    .msg.user .msg-icon { background: var(--accent); color: #fff; }
    .msg.bot  .msg-icon { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

    .msg-body { display: flex; flex-direction: column; gap: 6px; max-width: 70%; }
    .msg.user .msg-body { align-items: flex-end; }

    .bubble {
      padding: 10px 14px; border-radius: var(--radius);
      line-height: 1.65; font-size: .9rem; white-space: pre-wrap; word-break: break-word;
    }
    .msg.user .bubble { background: var(--user-bg); color: var(--user-text); border-bottom-right-radius: 4px; }
    .msg.bot  .bubble { background: var(--bot-bg); color: var(--bot-text); border: 1px solid var(--border); border-bottom-left-radius: 4px; box-shadow: 0 1px 3px rgba(0,0,0,.05); }

    .bubble.streaming::after { content: '▋'; animation: cur .6s step-end infinite; color: var(--accent); font-size: .8em; }
    @keyframes cur { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── Think block ── */
    .think-block {
      background: var(--think-bg); border: 1px solid var(--think-bd);
      border-radius: 10px; font-size: .78rem; color: var(--think-text);
      font-family: 'Geist Mono', monospace; overflow: hidden;
      transition: all .2s;
    }
    .think-block summary {
      padding: 6px 10px; cursor: pointer; user-select: none;
      display: flex; align-items: center; gap: 6px;
      list-style: none; outline: none;
      transition: background .15s;
    }
    .think-block summary::-webkit-details-marker { display: none; }
    .think-block summary:hover { background: rgba(0,0,0,.03); }
    .think-block summary::before { content: '▶'; font-size: .6rem; transition: transform .2s; display: inline-block; }
    .think-block[open] summary::before { transform: rotate(90deg); }
    .think-content { padding: 8px 10px 10px; border-top: 1px solid var(--think-bd); line-height: 1.6; white-space: pre-wrap; }
    .think-streaming .think-content::after { content: '▋'; animation: cur .6s step-end infinite; }

    /* Typing dots */
    .typing-dots { display: inline-flex; gap: 4px; align-items: center; padding: 3px 2px; }
    .typing-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--border2); animation: bounce .9s ease-in-out infinite; }
    .typing-dots span:nth-child(2){animation-delay:.15s} .typing-dots span:nth-child(3){animation-delay:.30s}
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-5px)} }

    .sys-msg { text-align: center; font-size: .68rem; font-family: 'Geist Mono', monospace; color: var(--muted); padding: 2px 0; }
    .sys-msg span { background: var(--surface2); border: 1px solid var(--border); padding: 3px 10px; border-radius: 20px; }

    /* ── Loading overlay ── */
    #loading-overlay { position: fixed; inset: 0; z-index: 99; background: rgba(245,244,240,.96); backdrop-filter: blur(6px); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; transition: opacity .4s; }
    #loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .load-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 32px 36px; display: flex; flex-direction: column; align-items: center; gap: 16px; box-shadow: var(--shadow); max-width: 320px; width: 90%; text-align: center; }
    .load-icon { font-size: 36px; }
    .load-title { font-size: 1rem; font-weight: 600; letter-spacing: -.01em; }
    .load-text { font-size: .78rem; color: var(--muted); font-family: 'Geist Mono', monospace; line-height: 1.6; white-space: pre-line; }
    #load-progress { width: 100%; height: 3px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
    #load-bar { height: 100%; background: var(--accent); width: 0%; transition: width .3s; border-radius: 3px; }

    /* ── Input bar ── */
    #input-bar { flex-shrink: 0; padding: 12px 14px 14px; border-top: 1px solid var(--border); background: var(--surface); display: flex; gap: 8px; align-items: flex-end; }
    #user-input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px;
      color: var(--text); font-family: 'Geist', sans-serif; font-size: .9rem;
      padding: 10px 14px; resize: none; outline: none; line-height: 1.5; max-height: 120px;
      transition: border-color .2s, box-shadow .2s;
    }
    #user-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
    #user-input::placeholder { color: var(--muted); }
    #send-btn {
      flex-shrink: 0; width: 40px; height: 40px; border: none; border-radius: 10px;
      background: var(--accent); color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform .12s, opacity .2s, background .15s;
    }
    #send-btn:hover:not(:disabled){background:#1d4ed8} #send-btn:active:not(:disabled){transform:scale(.92)} #send-btn:disabled{opacity:.35;cursor:default}
    @media(max-width:500px){.msg-body{max-width:88%} #app{box-shadow:none}}
  </style>
</head>
<body>
<div id="app">

  <div id="loading-overlay">
    <div class="load-card">
      <div class="load-icon">💬</div>
      <div class="load-title">Carregando PocketChat</div>
      <div class="load-text" id="load-text">Iniciando WebGPU…
Qwen3-0.6B q4f16 (~380MB)</div>
      <div id="load-progress"><div id="load-bar"></div></div>
    </div>
  </div>

  <header>
    <div class="avatar">💬</div>
    <div class="header-text">
      <div class="header-title">PocketChat</div>
      <div class="header-sub">Qwen3-0.6B · WebGPU · 100% local, sem servidor</div>
    </div>
    <div class="header-actions">
      <button id="clear-btn">limpar</button>
      <div class="status-pill loading" id="status-pill">
        <div class="status-dot"></div>
        <span id="status-label">carregando</span>
      </div>
    </div>
  </header>

  <div id="messages">
    <div class="sys-msg"><span>modelo carregando…</span></div>
  </div>

  <div id="input-bar">
    <textarea id="user-input" rows="1" placeholder="Digite sua mensagem…" disabled></textarea>
    <button id="send-btn" disabled>
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M2 8L14 8M14 8L9 3M14 8L9 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

</div>
<script type="module">
import { pipeline, TextStreamer, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3/dist/transformers.min.js';

env.allowLocalModels = false;
env.useBrowserCache  = true;

const MODEL_ID    = 'onnx-community/Qwen3-0.6B-ONNX';
const MODEL_DTYPE = 'q4f16';
const LS_KEY      = 'pocketchat_v1';

// Sem /no_think — queremos o raciocínio visível no PocketChat!
const SYSTEM_PROMPT = `You are PocketChat, a helpful and friendly AI assistant that runs entirely in the browser.
You are concise, clear, and useful. You answer questions directly and honestly.
You can help with writing, explaining concepts, answering questions, brainstorming, and general conversation.
When you don't know something, say so. Keep responses focused.
Always respond in the same language the user writes in.`;

const messagesEl  = document.getElementById('messages');
const inputEl     = document.getElementById('user-input');
const sendBtn     = document.getElementById('send-btn');
const clearBtn    = document.getElementById('clear-btn');
const statusPill  = document.getElementById('status-pill');
const statusLabel = document.getElementById('status-label');
const overlay     = document.getElementById('loading-overlay');
const loadTextEl  = document.getElementById('load-text');
const loadBar     = document.getElementById('load-bar');

let generator    = null;
let isGenerating = false;
let history      = [];

const escHtml    = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const scrollBottom = () => { messagesEl.scrollTop = messagesEl.scrollHeight; };

function setStatus(state, label) {
  statusPill.className = 'status-pill ' + state;
  statusLabel.textContent = label;
}

// ── localStorage ──────────────────────────────────────────────────────
function saveHistory() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(history)); } catch {}
}
function loadSaved() {
  try { return JSON.parse(localStorage.getItem(LS_KEY) || '[]'); } catch { return []; }
}

// ── UI helpers ────────────────────────────────────────────────────────
function addSysMsg(text) {
  const d = document.createElement('div');
  d.className = 'sys-msg'; d.innerHTML = `<span>${escHtml(text)}</span>`;
  messagesEl.appendChild(d); scrollBottom();
}
function addUserBubble(text) {
  const d = document.createElement('div');
  d.className = 'msg user';
  d.innerHTML = `<div class="msg-icon">Eu</div><div class="msg-body"><div class="bubble">${escHtml(text)}</div></div>`;
  messagesEl.appendChild(d); scrollBottom();
}

// Static bot message (for restoring history, no think block)
function addBotBubbleStatic(text) {
  const d = document.createElement('div');
  d.className = 'msg bot';
  d.innerHTML = `<div class="msg-icon">AI</div><div class="msg-body"><div class="bubble">${escHtml(text)}</div></div>`;
  messagesEl.appendChild(d); scrollBottom();
}

// Returns { thinkEl, bubbleEl, msgBody } for streaming
function createStreamingBotMessage() {
  const d = document.createElement('div');
  d.className = 'msg bot';
  d.innerHTML = `
    <div class="msg-icon">AI</div>
    <div class="msg-body">
      <details class="think-block think-streaming" style="display:none">
        <summary>💭 Ver raciocínio</summary>
        <div class="think-content"></div>
      </details>
      <div class="bubble streaming"></div>
    </div>`;
  messagesEl.appendChild(d); scrollBottom();
  return {
    thinkBlock:   d.querySelector('.think-block'),
    thinkContent: d.querySelector('.think-content'),
    bubbleEl:     d.querySelector('.bubble'),
  };
}

function addTypingIndicator() {
  const id = 'typing-' + Date.now();
  const d = document.createElement('div');
  d.className = 'msg bot'; d.id = id;
  d.innerHTML = `<div class="msg-icon">AI</div><div class="msg-body"><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div></div>`;
  messagesEl.appendChild(d); scrollBottom();
  return id;
}

function autoResize() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
}

// ── Restore conversation ──────────────────────────────────────────────
function restoreConversation() {
  history = loadSaved();
  if (!history.length) return false;
  messagesEl.innerHTML = '';
  addSysMsg('conversa restaurada');
  history.forEach(m => {
    if (m.role === 'user') addUserBubble(m.content);
    else if (m.role === 'assistant') addBotBubbleStatic(m.content);
  });
  return true;
}

// ── Load model ────────────────────────────────────────────────────────
async function loadModel() {
  try {
    generator = await pipeline('text-generation', MODEL_ID, {
      dtype: MODEL_DTYPE,
      device: 'webgpu',
      progress_callback(info) {
        if (info.status === 'progress' && info.total) {
          const pct = Math.round((info.loaded / info.total) * 100);
          loadBar.style.width = pct + '%';
          loadTextEl.textContent = `Baixando… ${pct}%\n${(info.loaded/1e6).toFixed(0)} / ${(info.total/1e6).toFixed(0)} MB`;
        }
        if (info.status === 'ready') { loadBar.style.width = '100%'; loadTextEl.textContent = '✓ Pronto!'; }
      },
    });

    overlay.classList.add('hidden');
    setStatus('ready', 'pronto');
    inputEl.disabled = false;
    sendBtn.disabled = false;
    inputEl.focus();

    const restored = restoreConversation();
    if (!restored) {
      messagesEl.innerHTML = '';
      addSysMsg('modelo local · sem internet · conversa privada');
      const welcome = 'Olá! Sou o PocketChat, rodando 100% no seu navegador via WebGPU. Como posso te ajudar?';
      addBotBubbleStatic(welcome);
      history = [{ role: 'assistant', content: welcome }];
      saveHistory();
    } else {
      addSysMsg('modelo pronto');
    }
  } catch (err) {
    console.error(err);
    loadTextEl.textContent = `Erro ao carregar:\n${err.message}`;
  }
}

// ── Send message ──────────────────────────────────────────────────────
async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isGenerating || !generator) return;

  isGenerating = true;
  sendBtn.disabled = true;
  inputEl.disabled = true;
  setStatus('typing', 'pensando…');

  addUserBubble(text);
  inputEl.value = '';
  autoResize();

  history.push({ role: 'user', content: text });

  const typingId = addTypingIndicator();

  try {
    const messages = [
      { role: 'system', content: SYSTEM_PROMPT },
      ...history.slice(-8),
    ];

    document.getElementById(typingId)?.remove();
    const { thinkBlock, thinkContent, bubbleEl } = createStreamingBotMessage();

    // ── Streaming state machine ──────────────────────────────────────
    let rawBuffer  = '';
    let inThink    = false;
    let thinkDone  = false;
    let thinkText  = '';
    let replyText  = '';

    const streamer = new TextStreamer(generator.tokenizer, {
      skip_prompt: true,
      skip_special_tokens: true,
      callback_function(token) {
        rawBuffer += token;

        if (!thinkDone) {
          const tStart = rawBuffer.indexOf('<think>');
          const tEnd   = rawBuffer.indexOf('</think>');

          if (tStart !== -1 && tEnd !== -1) {
            // Full think block captured
            thinkText = rawBuffer.slice(tStart + 7, tEnd).trim();
            replyText = rawBuffer.slice(tEnd + 8).trim();
            thinkDone = true;
            inThink   = false;
            thinkBlock.style.display = '';
            thinkBlock.classList.remove('think-streaming');
            thinkContent.textContent = thinkText;
            bubbleEl.textContent = replyText || ' ';
          } else if (tStart !== -1) {
            // Inside think block, still streaming
            inThink = true;
            thinkText = rawBuffer.slice(tStart + 7).trim();
            thinkBlock.style.display = '';
            thinkContent.textContent = thinkText;
          } else {
            // No think block at all — direct response
            replyText = rawBuffer.trim();
            thinkDone = true;
            bubbleEl.textContent = replyText || ' ';
          }
        } else {
          // Past think block, streaming reply
          const tEnd = rawBuffer.indexOf('</think>');
          replyText = tEnd !== -1
            ? rawBuffer.slice(tEnd + 8).trim()
            : rawBuffer.trim();
          bubbleEl.textContent = replyText || ' ';
        }

        scrollBottom();
      },
    });

    await generator(messages, {
      max_new_tokens: 512,
      temperature: 0.7,
      top_p: 0.9,
      repetition_penalty: 1.1,
      do_sample: true,
      streamer,
    });

    // ── Finalize ────────────────────────────────────────────────────
    bubbleEl.classList.remove('streaming');
    thinkBlock.classList.remove('think-streaming');

    // Final clean parse of full buffer
    const tStart = rawBuffer.indexOf('<think>');
    const tEnd   = rawBuffer.indexOf('</think>');
    let finalReply = '';

    if (tStart !== -1 && tEnd !== -1) {
      thinkContent.textContent = rawBuffer.slice(tStart + 7, tEnd).trim();
      thinkBlock.style.display = '';
      finalReply = rawBuffer.slice(tEnd + 8).trim();
    } else {
      finalReply = rawBuffer.replace(/<think>[\s\S]*?<\/think>/g, '').trim();
    }

    finalReply = finalReply || 'Hmm, não consegui gerar uma resposta. Tente novamente.';
    bubbleEl.textContent = finalReply;

    history.push({ role: 'assistant', content: finalReply });
    saveHistory();

  } catch (err) {
    document.getElementById(typingId)?.remove();
    console.error(err);
    addBotBubbleStatic('Ocorreu um erro ao gerar a resposta. Tente novamente.');
  } finally {
    isGenerating = false;
    sendBtn.disabled = false;
    inputEl.disabled = false;
    setStatus('ready', 'pronto');
    inputEl.focus();
  }
}

// ── Clear ─────────────────────────────────────────────────────────────
function clearConversation() {
  history = [];
  try { localStorage.removeItem(LS_KEY); } catch {}
  messagesEl.innerHTML = '';
  addSysMsg('conversa apagada');
  const msg = 'Tudo limpo! Como posso te ajudar?';
  addBotBubbleStatic(msg);
  history = [{ role: 'assistant', content: msg }];
}

// ── Events ────────────────────────────────────────────────────────────
inputEl.addEventListener('input', autoResize);
inputEl.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
sendBtn.addEventListener('click', sendMessage);
clearBtn.addEventListener('click', clearConversation);

loadModel();
</script>
</body>
</html>
